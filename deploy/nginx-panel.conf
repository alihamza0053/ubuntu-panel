# Nginx site for the ServerHub panel.
#
# Out of the box this answers on the server's IP address, so the panel works
# immediately after install with no domain and no DNS:
#
#     http://YOUR_SERVER_IP
#
# `server_name _;` matches nothing specific, and `default_server` makes this
# block handle any request whose Host doesn't match another site — which is
# exactly what a raw IP request looks like. Websites you deploy from the panel
# get their own server blocks with real domains, so they keep working; only
# unmatched requests land here.
#
# When you DO have a domain, point an A record at the server and swap the
# server_name line for your subdomain:
#
#     server_name panel.yourdomain.com;
#
# then:  sudo nginx -t && sudo systemctl reload nginx
# and for HTTPS:  sudo certbot --nginx -d panel.yourdomain.com
#
# ⚠️  On plain HTTP your password and session token cross the network in
#     cleartext. Fine on a trusted network or for a quick trial; before real
#     use, either add a domain + certbot (free) or restrict access by IP.
#     See DEPLOYMENT.md § 5.0.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Allow large file uploads through the panel
    client_max_body_size 200M;

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        # WebSocket support (terminal, live logs, script streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-lived WebSocket connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
